services:
  app:
    build:
      context: .
      args:
        VITE_STORE_HASH: ${VITE_STORE_HASH}
        VITE_CHANNEL_ID: ${VITE_CHANNEL_ID:-1}
        VITE_LOCAL_APP_CLIENT_ID: ${VITE_LOCAL_APP_CLIENT_ID:-}
        VITE_IS_LOCAL_ENVIRONMENT: "FALSE"
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATABASE_URL=${DATABASE_URL}
      - PGDATABASE=${PGDATABASE}
      - PGHOST=${PGHOST}
      - PGPORT=${PGPORT:-5432}
      - PGUSER=${PGUSER}
      - PGPASSWORD=${PGPASSWORD}
      - SESSION_SECRET=${SESSION_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - BIGCOMMERCE_STORE_HASH=${BIGCOMMERCE_STORE_HASH}
      - BIGCOMMERCE_CLIENT_ID=${BIGCOMMERCE_CLIENT_ID}
      - BIGCOMMERCE_CLIENT_SECRET=${BIGCOMMERCE_CLIENT_SECRET}
      - BIGCOMMERCE_ACCESS_TOKEN=${BIGCOMMERCE_ACCESS_TOKEN}
      - BIGCOMMERCE_B2B_MANAGEMENT_TOKEN=${BIGCOMMERCE_B2B_MANAGEMENT_TOKEN}
    restart: unless-stopped
